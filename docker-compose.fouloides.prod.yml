services:
  fouloides-backend:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      WS_PORT: 8788
      SOURCE: ${SOURCE:-stub}
      TICK_MS: ${TICK_MS:-150}
      SIZE: ${SIZE:-96}
      FOULOIDES: ${FOULOIDES:-14}
      DEVICE: ${DEVICE:-cpu}
      LIVE_BIGMAP: ${LIVE_BIGMAP:-0}
      LIVE_FRESH: ${LIVE_FRESH:-0}
      LIVE_CHECKPOINT: ${LIVE_CHECKPOINT:-runs/fouloide_live_homeostatic/checkpoint_live.pt}
      LIVE_CHECKPOINT_EVERY: ${LIVE_CHECKPOINT_EVERY:-5000}
    expose:
      - "8787"
      - "8788"
    volumes:
      - ./runs:/app/runs

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - fouloides-backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      FOULOIDES_DOMAIN: ${FOULOIDES_DOMAIN:-www.releaskills.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@releaskills.com}
    volumes:
      - ./deploy/fouloides/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
