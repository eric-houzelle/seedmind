<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedMind — Sandbox Live</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #6c9bff;
    --success: #4cdf7c;
    --danger: #ff5c5c;
    --warning: #ffb84d;
    --food: #66cc44;
    --wood: #c58a4a;
    --stone: #a7adb8;
    --energy: #ffcc00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  header h1 span { color: var(--accent); }
  #connection-status {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    background: var(--danger); color: #fff; transition: background 0.3s;
  }
  #connection-status.connected { background: var(--success); color: #111; }

  .main { display: flex; flex: 1; gap: 0; }

  .grid-panel {
    flex: 0 0 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px;
    border-right: 1px solid var(--border); min-width: 400px;
  }
  #grid-container {
    display: grid; gap: 2px; background: var(--border);
    border-radius: 8px; overflow: hidden; padding: 2px;
  }
  .cell {
    width: 48px; height: 48px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; font-weight: 700;
    border-radius: 4px; transition: background 0.15s;
  }
  .cell-empty { background: #1e2130; }
  .cell-wall { background: #3a3d4a; color: #666; }
  .cell-agent { background: #2a4080; color: #6c9bff; animation: pulse 1s infinite; }
  .cell-food { background: #1e3a1e; color: var(--food); }
  .cell-depleted { background: #1e2020; color: #444; }
  .cell-unknown { background: #111318; color: #333348; }
  .cell-wood { background: #302416; color: var(--wood); }
  .cell-stone { background: #252933; color: var(--stone); }
  .cell-workbench { background: #2d271a; color: var(--warning); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .grid-info {
    margin-top: 16px; display: flex; gap: 12px;
    font-size: 13px; color: var(--text-dim); flex-wrap: wrap;
  }
  .grid-info .tag {
    padding: 3px 10px; border-radius: 8px; background: var(--surface);
    border: 1px solid var(--border); min-width: 100px; text-align: center;
  }
  .grid-info .tag.food { border-color: var(--food); color: var(--food); }
  .grid-info .tag.wood { border-color: var(--wood); color: var(--wood); }
  .grid-info .tag.stone { border-color: var(--stone); color: var(--stone); }
  .grid-info .tag.tool { border-color: var(--warning); color: var(--warning); }

  /* Energy bar */
  .energy-bar-container {
    margin-top: 16px; width: 100%; max-width: 350px;
  }
  .energy-bar-label {
    font-size: 12px; color: var(--text-dim); margin-bottom: 4px;
    display: flex; justify-content: space-between;
  }
  .energy-bar-bg {
    width: 100%; height: 18px; background: #222; border-radius: 9px;
    overflow: hidden; border: 1px solid var(--border);
  }
  .energy-bar-fill {
    height: 100%; border-radius: 9px; transition: width 0.3s, background 0.3s;
  }

  .metrics-panel {
    flex: 1; padding: 24px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .metric-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px;
  }
  .metric-card h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .metric-value {
    font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1.1;
  }
  .metric-value.success { color: var(--success); }
  .metric-value.danger { color: var(--danger); }
  .metric-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .metrics-row .metric-card { padding: 12px 16px; }
  .metrics-row .metric-value { font-size: 24px; }

  .log-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px; flex: 1;
    min-height: 0; display: flex; flex-direction: column;
  }
  .log-card h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-dim); margin-bottom: 8px;
  }
  #episode-log {
    flex: 1; overflow-y: auto; font-size: 12px; line-height: 1.6;
    color: var(--text-dim); max-height: 300px;
  }
  #episode-log .log-survived { color: var(--success); }
  #episode-log .log-dead { color: var(--danger); }
  #episode-log .log-entry { border-bottom: 1px solid #1a1d25; padding: 2px 0; }

  #chart-container { width: 100%; height: 80px; margin-top: 8px; }
  #lifespan-chart {
    width: 100%; height: 100%; border-radius: 6px; background: #13151e;
  }

  .controls {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; background: var(--surface);
    border-top: 1px solid var(--border); font-size: 13px;
  }
  .controls label { color: var(--text-dim); }
  .controls input[type="range"] { width: 120px; accent-color: var(--accent); }
  #speed-label { color: var(--accent); min-width: 50px; }
  .controls .btn {
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-family: inherit; font-size: 12px;
  }
  .controls .btn:hover { border-color: var(--accent); }
  .controls .btn.active { background: var(--accent); color: #111; border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Seed<span>Mind</span> — Sandbox Survival</h1>
  <span id="connection-status">disconnected</span>
</header>

<div class="main">
  <div class="grid-panel">
    <div id="grid-container"></div>
    <div class="grid-info">
      <span class="tag" id="tag-action">—</span>
      <span class="tag" id="tag-reward">r=0.00</span>
      <span class="tag" id="tag-food">food: 0</span>
      <span class="tag" id="tag-wood">wood: 0</span>
      <span class="tag" id="tag-stone">stone: 0</span>
      <span class="tag" id="tag-tool">tool: 0</span>
    </div>
    <div class="energy-bar-container">
      <div class="energy-bar-label">
        <span>Energy</span>
        <span id="energy-text">50 / 100</span>
      </div>
      <div class="energy-bar-bg">
        <div class="energy-bar-fill" id="energy-fill" style="width: 50%; background: var(--energy);"></div>
      </div>
    </div>
  </div>

  <div class="metrics-panel">
    <div class="metrics-row">
      <div class="metric-card">
        <h3>Life</h3>
        <div class="metric-value" id="m-episode">0</div>
        <div class="metric-sub" id="m-step">step 0 / 200</div>
      </div>
      <div class="metric-card">
        <h3>Lifespan (100)</h3>
        <div class="metric-value success" id="m-lifespan">0</div>
        <div class="metric-sub" id="m-best-lifespan">best: 0</div>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <h3>Exploration (epsilon)</h3>
        <div class="metric-value" id="m-epsilon">1.00</div>
      </div>
      <div class="metric-card">
        <h3>Memory Items</h3>
        <div class="metric-value" id="m-memory">0</div>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <h3>TD Loss</h3>
        <div class="metric-value" id="m-td-loss">0.0000</div>
      </div>
      <div class="metric-card">
        <h3>WM Loss</h3>
        <div class="metric-value" id="m-wm-loss">0.0000</div>
      </div>
    </div>

    <div class="metric-card">
      <h3>Lifespan Over Time</h3>
      <div id="chart-container">
        <canvas id="lifespan-chart"></canvas>
      </div>
    </div>

    <div class="log-card">
      <h3>Life Log</h3>
      <div id="episode-log"></div>
    </div>
  </div>
</div>

<div class="controls">
  <label>Speed:</label>
  <input type="range" id="speed-slider" min="0" max="4" step="1" value="2">
  <span id="speed-label">normal</span>
  <button class="btn" id="btn-pause">Pause</button>
</div>

<script>
const ENTITY_ICONS = { 0: '', 1: '\u2588', 2: '\u25C9', 3: '\u2663', 4: '\u00B7', 5: '?', 6: 'W', 7: 'S', 8: 'T' };
const ENTITY_CSS   = { 0: 'cell-empty', 1: 'cell-wall', 2: 'cell-agent', 3: 'cell-food', 4: 'cell-depleted', 5: 'cell-unknown', 6: 'cell-wood', 7: 'cell-stone', 8: 'cell-workbench' };

const SPEED_LABELS = ['0.25x', '0.5x', 'normal', '2x', 'max'];
const SPEED_DELAYS = [400, 200, 100, 30, 0];

let ws = null, paused = false, gridSize = 8;
let lifespanHistory = [], bestLifespan = 0;

const statusEl = document.getElementById('connection-status');
const gridEl = document.getElementById('grid-container');
const logEl = document.getElementById('episode-log');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const pauseBtn = document.getElementById('btn-pause');

speedSlider.addEventListener('input', () => {
  const v = parseInt(speedSlider.value);
  speedLabel.textContent = SPEED_LABELS[v];
  sendControl({ speed: SPEED_DELAYS[v] });
});

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  pauseBtn.classList.toggle('active', paused);
  sendControl({ paused });
});

function sendControl(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function buildGrid(size) {
  gridSize = size;
  gridEl.style.gridTemplateColumns = `repeat(${size}, 48px)`;
  gridEl.innerHTML = '';
  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell cell-empty';
    cell.id = `c${i}`;
    gridEl.appendChild(cell);
  }
}

function updateGrid(grid) {
  const size = grid.length;
  if (size !== gridSize) buildGrid(size);
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const code = grid[r][c];
      const cell = document.getElementById(`c${r * size + c}`);
      cell.className = 'cell ' + (ENTITY_CSS[code] || 'cell-empty');
      cell.textContent = ENTITY_ICONS[code] || '';
    }
  }
}

function updateEnergy(energy, energyMax) {
  const pct = Math.max(0, Math.min(100, (energy / energyMax) * 100));
  const fill = document.getElementById('energy-fill');
  fill.style.width = pct + '%';
  if (pct > 50) fill.style.background = 'var(--energy)';
  else if (pct > 25) fill.style.background = 'var(--warning)';
  else fill.style.background = 'var(--danger)';
  document.getElementById('energy-text').textContent =
    `${Math.round(energy)} / ${Math.round(energyMax)}`;
}

function updateMetrics(d) {
  if (d.episode !== undefined) document.getElementById('m-episode').textContent = d.episode;
  if (d.step !== undefined)
    document.getElementById('m-step').textContent = `step ${d.step} / ${d.max_steps || '?'}`;
  if (d.mean_lifespan !== undefined) {
    const el = document.getElementById('m-lifespan');
    el.textContent = Math.round(d.mean_lifespan);
  }
  if (d.lifespan !== undefined && d.lifespan > bestLifespan) {
    bestLifespan = d.lifespan;
    document.getElementById('m-best-lifespan').textContent = `best: ${bestLifespan}`;
  }
  if (d.epsilon !== undefined) document.getElementById('m-epsilon').textContent = d.epsilon.toFixed(3);
  if (d.memory !== undefined) document.getElementById('m-memory').textContent = d.memory;
  if (d.td_loss !== undefined) document.getElementById('m-td-loss').textContent = d.td_loss.toFixed(4);
  if (d.wm_loss !== undefined) document.getElementById('m-wm-loss').textContent = d.wm_loss.toFixed(4);

  if (d.action !== undefined) document.getElementById('tag-action').textContent = d.action;
  if (d.reward !== undefined) document.getElementById('tag-reward').textContent = `r=${d.reward.toFixed(2)}`;
  if (d.inventory_food !== undefined) {
    const tag = document.getElementById('tag-food');
    tag.textContent = `food: ${d.inventory_food}`;
    tag.classList.toggle('food', d.inventory_food > 0);
  }
  for (const key of ['wood', 'stone', 'tool']) {
    const field = `inventory_${key}`;
    if (d[field] !== undefined) {
      const tag = document.getElementById(`tag-${key}`);
      tag.textContent = `${key}: ${d[field]}`;
      tag.classList.toggle(key, d[field] > 0);
    }
  }
  if (d.energy !== undefined && d.energy_max !== undefined) updateEnergy(d.energy, d.energy_max);
}

function addLogEntry(d) {
  if (d.type !== 'episode_end') return;
  const survived = !d.dead;
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (survived ? 'log-survived' : 'log-dead');
  entry.textContent = `life ${d.episode}: ${survived ? 'SURVIVED' : 'dead'} (${d.lifespan} steps, r=${d.reward.toFixed(2)})`;
  logEl.prepend(entry);
  while (logEl.children.length > 200) logEl.removeChild(logEl.lastChild);
}

function updateChart(lifespan) {
  lifespanHistory.push(lifespan);
  if (lifespanHistory.length > 200) lifespanHistory.shift();
  const canvas = document.getElementById('lifespan-chart');
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, w, h);

  const maxVal = Math.max(200, ...lifespanHistory);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
  for (let y = 0; y <= 1; y += 0.25) {
    const py = h - y * h;
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(w, py); ctx.stroke();
  }

  if (lifespanHistory.length < 2) return;
  const step = w / (lifespanHistory.length - 1);

  ctx.beginPath(); ctx.moveTo(0, h);
  for (let i = 0; i < lifespanHistory.length; i++)
    ctx.lineTo(i * step, h - (lifespanHistory[i] / maxVal) * h);
  ctx.lineTo((lifespanHistory.length - 1) * step, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(108,155,255,0.15)'; ctx.fill();

  ctx.beginPath();
  for (let i = 0; i < lifespanHistory.length; i++) {
    const x = i * step, y = h - (lifespanHistory[i] / maxVal) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#6c9bff'; ctx.lineWidth = 2; ctx.stroke();
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.hostname}:${parseInt(location.port) + 1}`);
  ws.onopen = () => { statusEl.textContent = 'connected'; statusEl.className = 'connected'; };
  ws.onclose = () => { statusEl.textContent = 'disconnected'; statusEl.className = ''; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (evt) => {
    const d = JSON.parse(evt.data);
    if (d.grid) updateGrid(d.grid);
    updateMetrics(d);
    if (d.type === 'episode_end') {
      addLogEntry(d);
      if (d.lifespan !== undefined) updateChart(d.lifespan);
    }
  };
}

buildGrid(8);
connect();
</script>
</body>
</html>
