<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedMind — Live Agent</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #6c9bff;
    --success: #4cdf7c;
    --danger: #ff5c5c;
    --warning: #ffb84d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  header h1 span { color: var(--accent); }
  #connection-status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--danger);
    color: #fff;
    transition: background 0.3s;
  }
  #connection-status.connected { background: var(--success); color: #111; }

  .main {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* Grid panel */
  .grid-panel {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    border-right: 1px solid var(--border);
    min-width: 400px;
  }
  #grid-container {
    display: grid;
    gap: 2px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
    padding: 2px;
  }
  .cell {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    border-radius: 4px;
    transition: background 0.15s, transform 0.15s;
    position: relative;
  }
  .cell-empty { background: #1e2130; }
  .cell-wall { background: #3a3d4a; color: #666; }
  .cell-agent { background: #2a4080; color: #6c9bff; animation: pulse 1s infinite; }
  .cell-key { background: #2a3520; color: #88cc44; }
  .cell-door-closed { background: #3a2520; color: #cc6644; }
  .cell-door-open { background: #1e2a20; color: #66aa55; }
  .cell-reward { background: #3a3520; color: #ffcc00; }
  .cell-danger { background: #3a1520; color: #ff4444; }
  .cell-unknown { background: #111318; color: #333348; }

  .cell-key-red { background: #3a1a1a; color: #ff6666; }
  .cell-key-blue { background: #1a1a3a; color: #6688ff; }
  .cell-key-green { background: #1a3a1a; color: #66ff88; }
  .cell-door-red-closed { background: #4a1a1a; color: #ff4444; }
  .cell-door-blue-closed { background: #1a1a4a; color: #4466ff; }
  .cell-door-green-closed { background: #1a4a1a; color: #44ff66; }
  .cell-door-red-open { background: #2a1515; color: #cc6666; }
  .cell-door-blue-open { background: #15152a; color: #6666cc; }
  .cell-door-green-open { background: #152a15; color: #66cc66; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .cell .icon { font-size: 22px; }

  /* Info below grid */
  .grid-info {
    margin-top: 16px;
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .grid-info .tag {
    padding: 3px 10px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    min-width: 100px;
    text-align: center;
  }
  .grid-info .tag.active { background: #2a3a20; border-color: var(--success); color: var(--success); }

  /* Right panel: metrics */
  .metrics-panel {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .metric-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .metric-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
  }
  .metric-value.success { color: var(--success); }
  .metric-value.danger { color: var(--danger); }
  .metric-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .metrics-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .metrics-row .metric-card { padding: 12px 16px; }
  .metrics-row .metric-value { font-size: 24px; }

  /* Episode log */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .log-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #episode-log {
    flex: 1;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    max-height: 300px;
  }
  #episode-log .log-success { color: var(--success); }
  #episode-log .log-fail { color: var(--danger); }
  #episode-log .log-entry { border-bottom: 1px solid #1a1d25; padding: 2px 0; }

  /* Speed control */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .controls label { color: var(--text-dim); }
  .controls input[type="range"] {
    width: 120px;
    accent-color: var(--accent);
  }
  #speed-label { color: var(--accent); min-width: 50px; }
  .controls .btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .controls .btn:hover { border-color: var(--accent); }
  .controls .btn.active { background: var(--accent); color: #111; border-color: var(--accent); }

  /* Canvas for success rate chart */
  #chart-container {
    width: 100%;
    height: 80px;
    margin-top: 8px;
    position: relative;
  }
  #success-chart {
    width: 100%;
    height: 100%;
    border-radius: 6px;
    background: #13151e;
  }
</style>
</head>
<body>

<header>
  <h1>Seed<span>Mind</span> — Live Agent</h1>
  <span id="connection-status">disconnected</span>
</header>

<div class="main">
  <div class="grid-panel">
    <div id="grid-container"></div>
    <div class="grid-info">
      <span class="tag" id="tag-key">no key</span>
      <span class="tag" id="tag-door">door closed</span>
      <span class="tag" id="tag-action">—</span>
      <span class="tag" id="tag-reward">r=0.00</span>
    </div>
  </div>

  <div class="metrics-panel">
    <div class="metrics-row">
      <div class="metric-card">
        <h3>Episode</h3>
        <div class="metric-value" id="m-episode">0</div>
        <div class="metric-sub" id="m-step">step 0 / 50</div>
      </div>
      <div class="metric-card">
        <h3>Success Rate (100)</h3>
        <div class="metric-value success" id="m-success">0.00</div>
        <div class="metric-sub" id="m-total-success">0 total successes</div>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <h3>Exploration (epsilon)</h3>
        <div class="metric-value" id="m-epsilon">1.00</div>
      </div>
      <div class="metric-card">
        <h3>Memory Items</h3>
        <div class="metric-value" id="m-memory">0</div>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <h3>TD Loss</h3>
        <div class="metric-value" id="m-td-loss">0.0000</div>
      </div>
      <div class="metric-card">
        <h3>WM Loss</h3>
        <div class="metric-value" id="m-wm-loss">0.0000</div>
      </div>
    </div>

    <div class="metric-card">
      <h3>Success Rate Over Time</h3>
      <div id="chart-container">
        <canvas id="success-chart"></canvas>
      </div>
    </div>

    <div class="log-card">
      <h3>Episode Log</h3>
      <div id="episode-log"></div>
    </div>
  </div>
</div>

<div class="controls">
  <label>Speed:</label>
  <input type="range" id="speed-slider" min="0" max="4" step="1" value="2">
  <span id="speed-label">normal</span>
  <button class="btn" id="btn-pause">Pause</button>
</div>

<script>
const ICONS = {
  0: '',         // empty
  1: '\u2588',   // wall (full block)
  2: '\u25C9',   // agent (fisheye)
  3: '\u2737',   // key (star)
  4: '\u2591',   // door closed
  5: '\u2592',   // door open
  6: '\u2605',   // reward (star)
  7: '\u2620',   // danger (skull)
  8: '',         // unknown
  9:  '\u2737', 10: '\u2737', 11: '\u2737',   // colored keys
  12: '\u2591', 13: '\u2591', 14: '\u2591',   // colored doors closed
  15: '\u2592', 16: '\u2592', 17: '\u2592',   // colored doors open
};

const CSS_CLASS = {
  0: 'cell-empty',
  1: 'cell-wall',
  2: 'cell-agent',
  3: 'cell-key',
  4: 'cell-door-closed',
  5: 'cell-door-open',
  6: 'cell-reward',
  7: 'cell-danger',
  8: 'cell-unknown',
  9: 'cell-key-red', 10: 'cell-key-blue', 11: 'cell-key-green',
  12: 'cell-door-red-closed', 13: 'cell-door-blue-closed', 14: 'cell-door-green-closed',
  15: 'cell-door-red-open', 16: 'cell-door-blue-open', 17: 'cell-door-green-open',
};

const SPEED_LABELS = ['0.25x', '0.5x', 'normal', '2x', 'max'];
const SPEED_DELAYS = [400, 200, 100, 30, 0];

let ws = null;
let paused = false;
let gridSize = 7;
let successHistory = [];

const statusEl = document.getElementById('connection-status');
const gridEl = document.getElementById('grid-container');
const logEl = document.getElementById('episode-log');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const pauseBtn = document.getElementById('btn-pause');

// Speed control
speedSlider.addEventListener('input', () => {
  const v = parseInt(speedSlider.value);
  speedLabel.textContent = SPEED_LABELS[v];
  sendControl({ speed: SPEED_DELAYS[v] });
});

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  pauseBtn.classList.toggle('active', paused);
  sendControl({ paused });
});

function sendControl(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function buildGrid(size) {
  gridSize = size;
  gridEl.style.gridTemplateColumns = `repeat(${size}, 48px)`;
  gridEl.innerHTML = '';
  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell cell-empty';
    cell.id = `c${i}`;
    gridEl.appendChild(cell);
  }
}

function updateGrid(grid) {
  const size = grid.length;
  if (size !== gridSize) buildGrid(size);
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const code = grid[r][c];
      const cell = document.getElementById(`c${r * size + c}`);
      cell.className = 'cell ' + (CSS_CLASS[code] || 'cell-unknown');
      cell.textContent = ICONS[code] || '';
    }
  }
}

function updateMetrics(d) {
  if (d.episode !== undefined) document.getElementById('m-episode').textContent = d.episode;
  if (d.step !== undefined) {
    document.getElementById('m-step').textContent = `step ${d.step} / ${d.max_steps || '?'}`;
  }
  if (d.success_rate !== undefined) {
    const el = document.getElementById('m-success');
    el.textContent = d.success_rate.toFixed(2);
    el.className = 'metric-value ' + (d.success_rate >= 0.3 ? 'success' : d.success_rate < 0.1 ? 'danger' : '');
  }
  if (d.total_successes !== undefined) {
    document.getElementById('m-total-success').textContent = `${d.total_successes} total successes`;
  }
  if (d.epsilon !== undefined) document.getElementById('m-epsilon').textContent = d.epsilon.toFixed(3);
  if (d.memory !== undefined) document.getElementById('m-memory').textContent = d.memory;
  if (d.td_loss !== undefined) document.getElementById('m-td-loss').textContent = d.td_loss.toFixed(4);
  if (d.wm_loss !== undefined) document.getElementById('m-wm-loss').textContent = d.wm_loss.toFixed(4);

  // Inventory tags
  if (d.has_key !== undefined) {
    const tag = document.getElementById('tag-key');
    const hasKey = d.has_key === 1;
    tag.textContent = hasKey ? (d.key_color ? `${d.key_color} key` : 'has key') : 'no key';
    tag.classList.toggle('active', hasKey);
  }
  if (d.door_open !== undefined) {
    const tag = document.getElementById('tag-door');
    const open = d.door_open === 1;
    tag.textContent = open ? 'door open' : 'door closed';
    tag.classList.toggle('active', open);
  }
  if (d.action !== undefined) document.getElementById('tag-action').textContent = d.action;
  if (d.reward !== undefined) document.getElementById('tag-reward').textContent = `r=${d.reward.toFixed(2)}`;
}

function addLogEntry(d) {
  if (d.type !== 'episode_end') return;
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (d.success ? 'log-success' : 'log-fail');
  entry.textContent = `ep ${d.episode}: ${d.success ? 'SUCCESS' : 'fail'} (${d.steps} steps, r=${d.reward.toFixed(2)})`;
  logEl.prepend(entry);
  while (logEl.children.length > 200) logEl.removeChild(logEl.lastChild);
}

// Simple chart
function updateChart(rate) {
  successHistory.push(rate);
  if (successHistory.length > 200) successHistory.shift();
  const canvas = document.getElementById('success-chart');
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  for (let y = 0; y <= 1; y += 0.25) {
    const py = h - y * h;
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(w, py); ctx.stroke();
  }

  if (successHistory.length < 2) return;
  const step = w / (successHistory.length - 1);

  // Fill
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let i = 0; i < successHistory.length; i++) {
    ctx.lineTo(i * step, h - successHistory[i] * h);
  }
  ctx.lineTo((successHistory.length - 1) * step, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(108,155,255,0.15)';
  ctx.fill();

  // Line
  ctx.beginPath();
  for (let i = 0; i < successHistory.length; i++) {
    const x = i * step;
    const y = h - successHistory[i] * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#6c9bff';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.hostname}:${parseInt(location.port) + 1}`);

  ws.onopen = () => {
    statusEl.textContent = 'connected';
    statusEl.className = 'connected';
  };
  ws.onclose = () => {
    statusEl.textContent = 'disconnected';
    statusEl.className = '';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    const d = JSON.parse(evt.data);
    if (d.grid) updateGrid(d.grid);
    updateMetrics(d);
    if (d.type === 'episode_end') {
      addLogEntry(d);
      if (d.success_rate !== undefined) updateChart(d.success_rate);
    }
  };
}

buildGrid(7);
connect();
</script>
</body>
</html>
