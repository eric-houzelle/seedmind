project:
  name: SeedMind

env:
  type: micro_fouloide
  size: 16
  max_steps: 500
  visibility_radius: 4
  energy_start: 0.75
  hydration_start: 0.75
  temperature_start: 0.5
  health_start: 1.0
  energy_decay: 0.007
  hydration_decay: 0.010
  rest_energy_decay_scale: 0.35
  food_energy_gain: 0.32
  water_hydration_gain: 0.42
  temperature_drift: 0.018
  temperature_recovery: 0.004
  critical_threshold: 0.14
  health_decay: 0.028
  danger_damage: 0.09
  num_food: 8
  num_water: 6
  num_warm_zones: 7
  num_cold_zones: 7
  num_dangers: 11
  num_obstacles: 24

agent:
  latent_dim: 64
  memory_top_k: 5

world_model:
  enabled: true
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64
  sampler: causal

causal_world_model:
  enabled: true
  predict_events: true
  feature_loss_weight: 2.0
  event_loss_weight: 0.25
  event_class_balance: true
  event_sample_names:
    - interact_water
    - interact_food
    - interact_noop
    - health_loss
    - death
  event_sample_name_weight: 2.0
  event_sample_done_weight: 2.0

value_model:
  enabled: true
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64
  gamma: 0.97
  target_update: 500
  sampler: causal
  reward_key: reward_learning
  updates_per_train: 8

curiosity:
  enabled: true
  weight: 0.5
  max_reward: 1.0

drive_reward:
  enabled: true
  weight: 2.0
  mode: delta

resource_reward:
  enabled: true
  weight: 1.0
  low_threshold: 0.35
  critical_threshold: 0.18
  event_rewards:
    interact_water: 0.10
    interact_food: 0.06
    interact_noop: -0.08
    move_blocked: -0.03
    damage: -0.08
    health_loss: -0.12
    death: -0.50
  low_hydration_water_bonus: 0.45
  critical_hydration_water_bonus: 0.70
  low_energy_food_bonus: 0.25
  critical_energy_food_bonus: 0.40
  low_hydration_water_signal_bonus: 0.06
  critical_hydration_water_signal_bonus: 0.10
  low_energy_food_signal_bonus: 0.03
  critical_energy_food_signal_bonus: 0.05
  local_signal_events:
    - move_ok
  low_drive_passive_penalty: 0.08

causal_curiosity:
  enabled: false
  weight: 0.2
  max_reward: 1.0
  novelty_bonus: 1.0
  repeat_bonus: 0.2

policy:
  type: epsilon_greedy
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_steps: 200000

planning:
  enabled: false
  weight: 0.0
  horizon: 3
  num_samples: 8
  terminal_value_weight: 1.0

dqn:
  enabled: true
  conv_channels: 64
  hidden_dim: 256
  learning_rate: 0.0005
  gamma: 0.97
  batch_size: 64
  target_update: 500
  double_dqn: true
  sampler: causal
  curiosity_weight: 1.0
  reward_key: reward_learning
  updates_per_train: 8

training:
  episodes: 8000
  train_every: 1
  checkpoint_every: 2000
