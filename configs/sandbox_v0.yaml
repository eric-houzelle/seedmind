project:
  name: SeedMind

env:
  type: sandbox
  size: 8
  max_steps: 200
  energy_max: 100.0
  energy_start: 50.0
  energy_decay: 1.0
  food_energy: 15.0
  num_food_sources: 6
  regrow_delay: 15

agent:
  latent_dim: 64
  memory_top_k: 5

world_model:
  enabled: true
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64

curiosity:
  enabled: true
  weight: 0.3
  max_reward: 1.0

policy:
  type: epsilon_greedy
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_steps: 40000

dqn:
  enabled: true
  conv_channels: 32
  hidden_dim: 128
  learning_rate: 0.0005
  gamma: 0.95
  batch_size: 64
  target_update: 300
  double_dqn: true
  sampler: uniform
  curiosity_weight: 0.0
  bc_warmup_updates: 0
  updates_per_train: 8

training:
  episodes: 5000
  train_every: 1
  checkpoint_every: 1000
