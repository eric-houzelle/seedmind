project:
  name: SeedMind

# === F1 — MORTALITÉ RÉELLE (expérience de déblocage du 'mur' policy) ===========
# Identique à micro_fouloide_online_homeostatic_rssm_v3.yaml SAUF le bloc de mort.
#
# HYPOTHÈSE : le 'mur' (la policy ne s'engage pas vers le fourrage) vient de ce que
# la famine ne tue JAMAIS (soft_death + health_floor=0.20 ⇒ on plafonne à 0.20, on
# ne meurt pas). Probe v3 (D2) : continue_prob ≈ 0.997 PARTOUT → le WM n'imagine
# jamais la mort → le death-discount de DreamerV3 est inerte → 'ne rien faire' et
# 'fourrager' ont ~le même return long → la policy est rationnellement indifférente.
#
# FIX TESTÉ ICI : on garde le tampon soft (l'agent vierge n'explose pas pendant
# l'exploration aléatoire), MAIS la négligence CHRONIQUE devient fatale : après
# `soft_death_grace_steps` pas critiques CONSÉCUTIFS, la santé tombe vraiment à 0.
# → il existe enfin un état terminal que le continue-predictor peut apprendre, et
#   le return des trajectoires non-fourrageuses est tronqué → fourrager paie.
# UNE SEULE variable changée vs v3 (le mécanisme de mort), rien d'autre.

env:
  type: micro_fouloide
  size: 32
  max_steps: 0              # monde infini, pas de timeout
  visibility_radius: 4
  energy_start: 0.75
  hydration_start: 0.75
  temperature_start: 0.5
  health_start: 1.0
  energy_decay: 0.005
  hydration_decay: 0.006
  rest_energy_decay_scale: 0.35
  food_energy_gain: 0.32
  water_hydration_gain: 0.42
  temperature_drift: 0.018
  temperature_recovery: 0.004
  critical_threshold: 0.14
  health_decay: 0.028
  danger_damage: 0.03
  soft_death: true
  health_floor: 0.20
  health_regen: 0.015
  soft_death_grace_steps: 40        # <<< F1 : tampon de 40 pas critiques (le temps d'apprendre à fourrager)
  critical_kill_health_decay: 0.05  # <<< F1 : après la grâce, la santé tombe à 0 (~4 pas) = MORT RÉELLE
  resource_regrow_steps: 120
  num_food: 32
  num_water: 24
  num_warm_zones: 28
  num_cold_zones: 28
  num_dangers: 16
  num_obstacles: 96

agent:
  latent_dim: 64
  memory_top_k: 5
  observation:
    egocentric:
      enabled: true
      radius: 5            # fenêtre 11×11
  encoder:
    conv_channels: 32
  imagination_policy: true  # policy = actor-critic appris EN IMAGINATION (Dreamer)
  actor:
    hidden_dim: 128
    num_layers: 2

imagination:
  horizon: 15
  context_len: 8
  lambda: 0.95
  entropy_coef: 0.001
  entropy_coef_start: 0.03
  entropy_coef_end: 0.0003
  entropy_decay_steps: 40000
  advantage_norm: percentile
  critic_twohot: true
  critic_num_bins: 255
  critic_vmax: 20.0
  actor_lr: 0.0004
  critic_lr: 0.0004

world_model:
  enabled: true
  recurrent: true
  rssm_stochastic: true
  rssm_stoch: 32
  rssm_discrete: 32
  reward_twohot: true
  kl_free: 1.0
  kl_dyn_scale: 0.5
  kl_rep_scale: 0.1
  deter_dim: 128
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64
  sampler: causal
  uncertainty_head_updates_per_train: 2
  reward_key: reward_learning

causal_world_model:
  enabled: true
  predict_events: true
  feature_loss_weight: 2.0
  event_loss_weight: 0.25
  event_class_balance: true
  event_sample_names:
    - interact_water
    - interact_food
    - interact_noop
    - health_loss
    - death
    - damage
  event_sample_name_weight: 2.0
  event_sample_done_weight: 2.0

value_model:
  enabled: false
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64
  gamma: 0.97
  target_update: 500
  sampler: causal
  reward_key: reward_learning

curiosity:
  enabled: true
  weight: 0.5
  max_reward: 1.0

drive_reward:
  enabled: true
  weight: 1.0
  mode: absolute
  comfort:
    enabled: true
    aggregation: mean_min_product
    energy: {low: 0.5, high: 1.0}
    hydration: {low: 0.5, high: 1.0}
    health: {low: 0.6, high: 1.0}
    temperature: {target: 0.5, tolerance: 0.15}

resource_reward:
  enabled: true
  weight: 1.0
  low_threshold: 0.35
  critical_threshold: 0.18
  event_rewards:
    interact_water: 0.10
    interact_food: 0.06
    interact_noop: -0.08
    move_blocked: -0.03
    damage: -0.12
    health_loss: -0.12
  low_hydration_water_bonus: 0.45
  critical_hydration_water_bonus: 0.70
  low_energy_food_bonus: 0.25
  critical_energy_food_bonus: 0.40
  low_drive_passive_penalty: 0.08

policy:
  type: epsilon_greedy
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 30000

planning:
  enabled: false
  weight: 0.25
  horizon: 5
  num_samples: 8
  terminal_value_weight: 1.0
  margin_threshold: 0.01
  q_advantage_threshold: 0.02

dqn:
  enabled: true
  conv_channels: 64
  hidden_dim: 256
  learning_rate: 0.0005
  gamma: 0.97
  batch_size: 64
  target_update: 500
  double_dqn: true
  sampler: causal
  curiosity_weight: 1.0
  reward_key: reward_learning

online:
  update_every: 8
  updates_per_cycle: 4
  seq_len: 16
  burn_in: 8
  warmup_steps: 2000
  threshold_refresh_steps: 500
  threshold_quantile: 0.60
  threshold_samples: 2000
