project:
  name: SeedMind

# Config phare (EPIC A complet) : monde homéostatique persistant + écosystème
# d'artefacts (baies, graines, branche/silex→feu de camp) + inventaire +
# observation par PROPRIÉTÉS (dimension fixe quel que soit le nombre
# d'entités → ajout d'artefacts à chaud) + mémoire spatiale égocentrique.

env:
  type: micro_fouloide
  size: 32                  # carte 32×32 (densités d'entités conservées)
  max_steps: 0              # monde infini, pas de timeout
  visibility_radius: 4
  energy_start: 0.75
  hydration_start: 0.75
  temperature_start: 0.5
  health_start: 1.0
  energy_decay: 0.005       # decays doux (curriculum option A)
  hydration_decay: 0.006
  rest_energy_decay_scale: 0.35
  food_energy_gain: 0.32
  water_hydration_gain: 0.42
  temperature_drift: 0.018
  temperature_recovery: 0.004
  critical_threshold: 0.14
  health_decay: 0.028
  danger_damage: 0.03   # douleur nette mais mort seulement par exposition prolongée
  soft_death: true          # curriculum : un plancher temporaire laisse apprendre
  health_floor: 0.20
  soft_death_grace_steps: 300 # après ~300 ticks critiques, faim/soif tuent aussi
  critical_kill_health_decay: 0.028
  health_regen: 0.015
  resource_regrow_steps: 120
  resource_regrow_elsewhere: true  # repousse AILLEURS → camper ne paie plus,
                                   # l'agent doit explorer + se souvenir
  resource_regrow_radius: 6        # mais À PROXIMITÉ (rayon 6) → reste trouvable,
                                   # réduit les morts sans réautoriser le campement
  filter_blocked_moves: true
  filter_noop_interact: true
  filter_noop_inventory: true
  num_food: 32
  num_water: 24
  num_warm_zones: 28
  num_cold_zones: 28
  num_dangers: 16
  num_obstacles: 96
  entities: configs/entities_example.yaml
  property_events: true     # interact_energy/hydration : vocabulaire fixe,
                            # ajouter un comestible ne redimensionne pas le WM
  num_berry_bush: 12
  num_berry_seed: 16
  num_branch: 16
  num_flint: 16
  inventory:
    enabled: true
    capacity: 3

agent:
  latent_dim: 64
  memory_top_k: 5
  observation:
    mode: properties          # perçoit les propriétés, pas les identités
    spatial_memory:
      enabled: true           # carte égocentrique remplie par le vécu
      horizon: 1500           # mémoire LONGUE : se souvenir de beaucoup de
                              # ressources → y retourner au lieu de mourir
                              # (avec 24 eau + 32 bouffe, il doit tjrs connaître un point)

world_model:
  enabled: true
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64
  sampler: causal
  uncertainty_head_updates_per_train: 2

causal_world_model:
  enabled: true
  predict_events: true
  feature_loss_weight: 2.0
  event_loss_weight: 0.25
  event_class_balance: true
  event_sample_names:
    - interact_hydration
    - interact_energy
    - interact_noop
    - health_loss
    - death
  event_sample_name_weight: 2.0
  event_sample_done_weight: 2.0

value_model:
  enabled: true
  hidden_dim: 128
  num_layers: 2
  learning_rate: 0.0003
  batch_size: 64
  gamma: 0.97
  target_update: 500
  sampler: causal
  reward_key: reward_learning

curiosity:
  enabled: true
  weight: 0.8
  max_reward: 1.0

drive_reward:
  enabled: true
  weight: 1.0
  # absolute : le confort paie à chaque step, le fond du trou coûte à chaque
  # step. En mode delta, la somme télescope à ~0 et l'inaction au plancher
  # devenait gratuite (pathologie observée sur 3 seeds × 100k, cf seedmind-pvg).
  mode: absolute
  comfort:
    enabled: true
    aggregation: mean_min_product
    energy: {low: 0.5, high: 1.0}
    hydration: {low: 0.5, high: 1.0}
    health: {low: 0.95, high: 1.0}
    temperature: {target: 0.5, tolerance: 0.15}

resource_reward:
  enabled: true
  weight: 1.0
  low_threshold: 0.35
  critical_threshold: 0.18
  event_rewards:
    interact_hydration: 0.35
    interact_energy: 0.25
    interact_noop: -0.08
    pick_ok: 0.04
    plant_ok: 0.08
    combine_ok: 0.12
    pick_noop: -0.04
    plant_noop: -0.04
    combine_noop: -0.04
    move_blocked: -0.03
    damage: -0.08
    health_loss: -0.30
    death: -1.00
  low_hydration_water_bonus: 0.90
  critical_hydration_water_bonus: 1.40
  low_energy_food_bonus: 0.55
  critical_energy_food_bonus: 0.90
  # Bonus "signal" supprimés : rente farmable sans échéance de mort — l'agent
  # tournait autour de l'eau éternellement assoiffé sans boire (seedmind-pvg).
  # Les bonus de consommation (one-shot, non farmables) suffisent.
  low_drive_passive_penalty: 0.08

policy:
  type: epsilon_greedy
  epsilon_start: 1.0
  epsilon_end: 0.08
  epsilon_decay_steps: 30000

planning:
  enabled: true
  weight: 0.4               # le WM pèse vraiment dans la décision (était 0.08)
  horizon: 15               # imaginer assez loin pour rejoindre une ressource mémorisée
  num_samples: 16           # plus de trajectoires imaginées (horizon plus long)
  terminal_value_weight: 1.0
  margin_threshold: 0.0     # gates ouvertes : le planner s'engage (était 0.05)
  q_advantage_threshold: 0.0  # (était 0.15)
  # uncertainty_threshold piloté en ligne par OnlineLearner (quantile glissant)

dqn:
  enabled: true
  conv_channels: 64
  hidden_dim: 256
  learning_rate: 0.0005
  gamma: 0.97
  batch_size: 64
  target_update: 500
  double_dqn: true
  sampler: causal
  curiosity_weight: 1.0     # drive « ennui » : erreur de prédiction du WM
  reward_key: reward_learning

online:
  update_every: 8           # un cycle d'apprentissage tous les 8 steps env
  updates_per_cycle: 4      # minibatchs WM/DQN/Value par cycle
  warmup_steps: 12000       # planner fermé longtemps : Q apprend d'abord du réel
  threshold_refresh_steps: 500
  threshold_quantile: 0.70    # ouvre le gate d'incertitude : planner utilisé bien
                              # plus souvent (sur les 70% d'états où le WM est sûr)
  threshold_samples: 2000

action_curriculum:
  enabled: true
  # Les artefacts restent visibles dès le début, mais la manipulation
  # d'objets attend que l'agent démontre d'abord une survie basique.
  artifact_actions: [PICK, DROP, PLANT, COMBINE]
  unlock_after_steps: 20000
  min_recent_samples: 500
  min_recent_wellbeing: 0.65
  min_recent_hydration_events: 3
  min_recent_energy_events: 1
