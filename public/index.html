<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedMind — Fouloïdes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;            /* desktop : pas de scroll */
    overflow-x: hidden;          /* mobile : jamais de scroll horizontal */
    background: #1a2a14;
    -webkit-text-size-adjust: 100%;
  }
  body { font-family: 'Courier New', monospace; }

  /* Le conteneur de la carte : plein écran sous le HUD, sous l'onglet actif. */
  #map-view {
    position: absolute; inset: 0;
    touch-action: none;          /* on gère le pan/zoom tactile nous-mêmes */
  }

  #world-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    image-rendering: pixelated; cursor: grab;
    touch-action: none;
  }
  #world-canvas.dragging { cursor: grabbing; }

  /* La vue est masquée quand l'onglet Stats est actif. */
  body.tab-stats #map-view { display: none; }
  body.tab-stats .hud { display: none !important; }
  body.tab-map #dashboard { display: none; }

  /* ---- HUD (style fouloïdes) ---- */
  .hud { position: absolute; user-select: none; pointer-events: none; }

  #badge-pop {
    top: 14px; left: 14px; width: 78px; height: 78px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #5a4632, #2e2218 70%);
    border: 4px solid #1c150d;
    box-shadow: 0 0 0 3px #6b5638, 0 4px 10px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff;
  }
  #badge-pop .icon { font-size: 22px; line-height: 1; filter: saturate(1.4); }
  #badge-pop .count { font-size: 22px; font-weight: 700; text-shadow: 1px 2px 0 #000; }

  #objective {
    top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: stretch;
    border: 3px solid #16323a; box-shadow: 0 4px 8px rgba(0,0,0,0.45);
    font-size: 13px; letter-spacing: 1px; max-width: 70vw;
  }
  #objective .label {
    background: #2bb3c9; color: #fff; padding: 8px 10px;
    display: flex; align-items: center; font-weight: 700; font-size: 11px;
  }
  #objective .text {
    background: #eef6f8; color: #16323a; padding: 8px 14px;
    font-weight: 700; text-transform: uppercase; line-height: 1.45;
  }

  #menu-btn {
    top: 22px; right: 22px; width: 44px; height: 34px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  #menu-btn span {
    display: block; height: 7px; background: #d8d4c8; border-radius: 3px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }

  #tools-btn {
    bottom: 22px; right: 22px; width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #5a4632, #2e2218 70%);
    border: 4px solid #1c150d;
    box-shadow: 0 0 0 3px #6b5638, 0 4px 10px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    color: #d8d4c8; font-size: 26px;
  }

  #status {
    bottom: 18px; left: 18px; padding: 5px 12px;
    background: rgba(10, 20, 8, 0.75); color: #9fd28a;
    border: 2px solid #16323a; font-size: 11px; letter-spacing: 1px;
    pointer-events: none;
  }
  #status.offline { color: #e0705a; }

  #help {
    bottom: 18px; left: 50%; transform: translateX(-50%);
    padding: 4px 10px; background: rgba(10, 20, 8, 0.6); color: #cfe8c0;
    font-size: 10px; letter-spacing: 1px; pointer-events: none;
    border-radius: 4px;
  }

  #legend {
    top: 110px; left: 14px; padding: 8px 10px;
    background: rgba(10, 20, 8, 0.75); color: #cfe8c0;
    border: 2px solid #16323a; border-radius: 4px;
    font-size: 10px; letter-spacing: 0.5px; line-height: 1;
  }
  #legend .title { color: #9fd28a; font-weight: 700; margin-bottom: 6px; }
  #legend .row { display: flex; align-items: center; gap: 7px; margin: 4px 0; }
  #legend canvas { width: 18px; height: 18px; image-rendering: pixelated; flex: none; }
  #legend .fog-swatch {
    width: 18px; height: 18px; flex: none; border-radius: 2px;
    background: #2a3a22;
    box-shadow: inset 0 0 0 9px rgba(8, 14, 6, 0.45);
  }

  #event-ticker {
    bottom: 48px; left: 50%; transform: translateX(-50%);
    padding: 6px 14px; background: rgba(10, 20, 8, 0.85); color: #f2e6b8;
    border: 2px solid #6b5638; border-radius: 4px;
    font-size: 13px; letter-spacing: 1px; font-weight: 700;
    opacity: 0; transition: opacity 0.4s ease;
  }
  #event-ticker.show { opacity: 1; }

  /* ---- Barre d'onglets Carte / Stats ---- */
  #tabbar {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 50;
    background: rgba(10, 20, 8, 0.8); padding: 4px; border-radius: 8px;
    border: 2px solid #16323a; box-shadow: 0 4px 8px rgba(0,0,0,0.45);
  }
  /* En mode Stats, on remonte la barre tout en haut (le HUD est masqué). */
  body.tab-stats #tabbar { top: 10px; }
  #tabbar button {
    font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: #9fd28a; background: transparent; border: none; cursor: pointer;
    padding: 7px 16px; border-radius: 5px; text-transform: uppercase;
  }
  #tabbar button.active { background: #2bb3c9; color: #fff; }

  /* L'objectif central laisse la place à la barre d'onglets. */
  #objective { top: 58px; }

  /* ---- Tableau de bord d'apprentissage ---- */
  #dashboard {
    position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
    background: #14210f; color: #cfe8c0; padding: 64px 18px 28px;
    -webkit-overflow-scrolling: touch;
  }
  #dashboard h1 {
    font-size: 16px; color: #9fd28a; letter-spacing: 1px; margin-bottom: 4px;
  }
  #dashboard .subtitle { font-size: 11px; color: #7fae6f; margin-bottom: 16px; }

  .metric-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .metric {
    background: rgba(10, 20, 8, 0.6); border: 2px solid #16323a;
    border-radius: 6px; padding: 10px 12px;
  }
  .metric .k { font-size: 10px; color: #7fae6f; letter-spacing: 1px; text-transform: uppercase; }
  .metric .v { font-size: 20px; color: #f2e6b8; font-weight: 700; margin-top: 3px; }
  .metric .v small { font-size: 11px; color: #9fd28a; font-weight: 400; }

  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .chart-card {
    background: rgba(10, 20, 8, 0.5); border: 2px solid #16323a;
    border-radius: 6px; padding: 10px 12px 12px;
  }
  .chart-card .title {
    font-size: 11px; color: #9fd28a; letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .chart-card .legend-dot { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: #cfe8c0; }
  .chart-card .legend-dot i { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }
  .chart-card canvas { width: 100%; height: 130px; display: block; }
  #dashboard .waiting { color: #7fae6f; font-size: 12px; padding: 20px 0; }

  /* ---- Adaptation mobile / téléphone ---- */
  @media (max-width: 760px) {
    /* Le HUD volumineux est réduit pour ne pas masquer la carte. */
    #legend { display: none; }
    #badge-pop { top: 10px; left: 10px; width: 56px; height: 56px; border-width: 3px; }
    #badge-pop .icon { font-size: 16px; }
    #badge-pop .count { font-size: 16px; }
    #objective { max-width: 92vw; font-size: 11px; top: 64px; }
    #objective .label { padding: 6px 7px; font-size: 9px; }
    #objective .text { padding: 6px 9px; font-size: 10px; }
    #menu-btn { top: 14px; right: 14px; }
    #tools-btn { width: 56px; height: 56px; bottom: 14px; right: 14px; font-size: 22px; }
    #help { display: none; }
    #status { font-size: 10px; bottom: 12px; left: 12px; }
    #dashboard { padding: 60px 12px 28px; }
    #dashboard h1 { font-size: 14px; }
    .metric .v { font-size: 17px; }
    .charts { grid-template-columns: 1fr; }   /* empilé verticalement */
    .chart-card canvas { height: 120px; }
  }
</style>
</head>
<body class="tab-map">

<div id="tabbar">
  <button id="tab-map-btn" class="active">Carte</button>
  <button id="tab-stats-btn">Stats</button>
</div>

<div id="map-view">
<canvas id="world-canvas"></canvas>

<div class="hud" id="badge-pop">
  <div class="icon">&#128048;</div>
  <div class="count" id="pop-count">0</div>
</div>

<div class="hud" id="objective">
  <div class="label">OBJECTIF</div>
  <div class="text" id="objective-text">EN ATTENTE DU MONDE&hellip;</div>
</div>

<div class="hud" id="menu-btn"><span></span><span></span><span></span></div>
<div class="hud" id="tools-btn">&#128296;</div>

<div class="hud" id="legend"><div class="title">L&Eacute;GENDE</div></div>

<div class="hud" id="event-ticker"></div>

<div class="hud" id="status">connexion&hellip;</div>
<div class="hud" id="help">glisser : d&eacute;placer &middot; molette : zoom &middot; fl&egrave;ches : cam&eacute;ra</div>
</div><!-- /#map-view -->

<div id="dashboard">
  <h1>Apprentissage en direct</h1>
  <div class="subtitle">Le fouloïde apprend à survivre &mdash; m&eacute;triques collect&eacute;es tick par tick.</div>
  <div class="metric-grid" id="metric-grid"></div>
  <div class="charts" id="charts"></div>
  <div class="waiting" id="dash-waiting">En attente de donn&eacute;es du flux&hellip;</div>
</div>

<script>
'use strict';

// ===========================================================================
// Sprites pixel-art (générés procéduralement, style fouloïdes)
// ===========================================================================

const PALETTE = {
  '.': null,
  // fouloïde
  'Y': '#e9b84d', 'y': '#caa53b', 'D': '#a87f25', 'R': '#a84a2c',
  'K': '#241a10', 'B': '#4f93d8', 'b': '#3a76b5',
  // arbre
  'N': '#6b4226', 'n': '#523019',
  'G': '#2c6430', 'g': '#3c853f', 'h': '#54a455', 'H': '#6fbf6a',
  // pomme
  'A': '#c22e2e', 'a': '#e25b51', 's': '#5a3a1e', 'l': '#4f9a3e',
  // baignoire
  'W': '#e9e9ef', 'w': '#bdbfca', 'E': '#5aa7e0', 'e': '#82c4ef',
  'F': '#caa23a',
  // rocher
  'S': '#8b8f98', 'T': '#6c7078', 'U': '#a6aab2',
  // danger (lave / braises)
  'V': '#b3331f', 'v': '#7a2114', 'O': '#f08a3c',
};

const SPRITES = {
fouloide: [

],
tree: [

'..GGgGGGGGgGG...',

],

],

'.WwEEEEeEEEEwW..',
'.WwwwwwwwwwwwW..',

],
rock: [
'................',

'..SSSSSTTTTT....',

],

'.vVv..vVv.vVv...',
'.VOVv.VOVvVOVv..',
'vVOOVvVOOVVOOv..',

'.vVVVvvVVVvVVv..',
'..vvv..vvv.vv...',

],

],
bush: [
'................',
'.....GGgg.......',
'...GghhhgGG.....',
'..GghAhhgAgG....',
'.GghhhgghhhgG...',
'.GgAhhgghAhgG...',
'..GghhhAhhgG....',
'...GGgghhgG.....',
'.....nn.........',
'................',
],
branch: [
'................',
'..........nn....',
'.......nnnNn....',
'....nnNNNn......',
'..nNNNnn........',
'.nNn............',
'................',

],

],
campfire: [

'....YOVOYOY.....',
'....OVVVOVO.....',
'...YOVVVVVOY....',
'....nNNNNNn.....',
'...nNNnnNNNn....',
'................',

],
};

// Sprites d'artefacts dédiés : render hint -> sprite + décalage en pixels-tuile
const ARTIFACT_SPRITES = {
  seed:     { spr: 'seed', dx: 4, dy: 5 },
  bush:     { spr: 'bush', dx: 0, dy: 3 },
  branch:   { spr: 'branch', dx: 0, dy: 4 },
  flint:    { spr: 'flint', dx: 4, dy: 5 },
  campfire: { spr: 'campfire', dx: 0, dy: 3 },
};

function makeSprite(rows) {
  const h = rows.length, w = rows[0].length;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++) {
      const col = PALETTE[rows[y][x]];
      if (col) { ctx.fillStyle = col; ctx.fillRect(x, y, 1, 1); }
    }
  return c;
}

const SPR = {};
for (const [name, rows] of Object.entries(SPRITES)) SPR[name] = makeSprite(rows);

// ===========================================================================
// Tuiles de sol (variantes d'herbe, générées avec bruit déterministe)
// ===========================================================================

const TILE = 16;
const GRASS_BASE   = ['#4a7d36', '#467a33', '#4e8139'];
const GRASS_DARK   = '#3f6f2d';
const GRASS_LIGHT  = '#5b9043';
const WARM_BASE    = ['#9a9050', '#a09455', '#948c4b'];   // herbe sèche/chaude (ocre)
const WARM_SPECK   = '#b3a45e';
const COLD_BASE    = ['#7e9e9b', '#789a96', '#83a3a0'];   // herbe givrée (bleutée)
const COLD_SPECK   = '#a8c4c1';

function hash(x, y, s) {
  let h = (x * 374761393 + y * 668265263 + s * 1442695041) | 0;
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) >>> 0) / 4294967296;
}

function makeTile(kind, variant) {
  const c = document.createElement('canvas');
  c.width = TILE; c.height = TILE;
  const ctx = c.getContext('2d');
  const base = (kind === 1 ? WARM_BASE : kind === 2 ? COLD_BASE : GRASS_BASE)[variant % 3];
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, TILE, TILE);
  for (let y = 0; y < TILE; y++)
    for (let x = 0; x < TILE; x++) {
      const r = hash(x, y, variant + kind * 7);
      if (kind === 1) {
        if (r < 0.10) { ctx.fillStyle = WARM_SPECK; ctx.fillRect(x, y, 1, 1); }
      } else if (kind === 2) {
        if (r < 0.10) { ctx.fillStyle = COLD_SPECK; ctx.fillRect(x, y, 1, 1); }
      } else {
        if (r < 0.06) { ctx.fillStyle = GRASS_DARK; ctx.fillRect(x, y, 1, 1); }
        else if (r > 0.96) { ctx.fillStyle = GRASS_LIGHT; ctx.fillRect(x, y, 1, 1); }
      }
    }
  return c;
}

const TILES = { 0: [], 1: [], 2: [] };
for (let v = 0; v < 3; v++) {
  TILES[0].push(makeTile(0, v));
  TILES[1].push(makeTile(1, v));
  TILES[2].push(makeTile(2, v));
}

// ===========================================================================
// Légende
// ===========================================================================

function legendSwatch(drawFn) {
  const c = document.createElement('canvas');
  c.width = TILE; c.height = TILE;
  drawFn(c.getContext('2d'));
  return c;
}

(function buildLegend() {
  const el = document.getElementById('legend');
  const onGrass = (spr, ox = 0, oy = 0) => legendSwatch(ctx2 => {
    ctx2.drawImage(TILES[0][0], 0, 0);
    ctx2.drawImage(spr, ox, oy);
  });
  const entries = [
    [legendSwatch(c => c.drawImage(TILES[0][0], 0, 0)), 'herbe'],
    [legendSwatch(c => c.drawImage(TILES[1][0], 0, 0)), 'zone chaude (T\u00b0 monte)'],
    [legendSwatch(c => c.drawImage(TILES[2][0], 0, 0)), 'zone froide (T\u00b0 baisse)'],
    [onGrass(SPR.rock, 0, 3), 'rocher \u2014 infranchissable'],
    [onGrass(SPR.danger, 0, 3), 'danger \u2014 blesse, peut tuer'],
    [onGrass(SPR.bath, 0, 2), 'eau \u2014 boire (INTERACT)'],
    [onGrass(SPR.apple, 4, 4), 'pomme \u2014 manger (INTERACT)'],
    [onGrass(SPR.bush, 0, 3), 'buisson \u00e0 baies \u2014 manger'],
    [onGrass(SPR.seed, 4, 5), 'graine \u2014 ramasser, planter'],
    [onGrass(SPR.branch, 0, 4), 'branche \u2014 ramasser, combiner'],
    [onGrass(SPR.flint, 4, 5), 'silex \u2014 ramasser, combiner'],
    [onGrass(SPR.campfire, 0, 3), 'feu de camp \u2014 r\u00e9chauffe'],
    [legendSwatch(c => c.drawImage(SPR.fouloide, 0, 0)), 'fouloïde'],
    [legendSwatch(c => {
      c.drawImage(TILES[0][0], 0, 0);
      c.fillStyle = 'rgba(10,16,8,0.8)'; c.fillRect(2, 1, 12, 2);
      c.fillStyle = '#b777e8'; c.fillRect(2, 1, 8, 2);
      c.fillStyle = 'rgba(10,16,8,0.8)'; c.fillRect(2, 4, 12, 2);
      c.fillStyle = '#e25b51'; c.fillRect(2, 4, 9, 2);
      c.fillStyle = 'rgba(10,16,8,0.8)'; c.fillRect(2, 7, 12, 2);
      c.fillStyle = '#5aa7e0'; c.fillRect(2, 7, 6, 2);
      c.fillStyle = 'rgba(10,16,8,0.8)'; c.fillRect(2, 10, 12, 2);
      c.fillStyle = '#e9b84d'; c.fillRect(2, 10, 10, 2);
      c.fillStyle = 'rgba(10,16,8,0.8)'; c.fillRect(2, 13, 12, 2);
      c.fillStyle = '#f08a3c'; c.fillRect(2, 13, 11, 2);
    }), 'bien-\u00eatre / sant\u00e9 / eau / \u00e9nergie / T\u00b0'],
  ];
  for (const [swatch, label] of entries) {
    const row = document.createElement('div');
    row.className = 'row';
    row.appendChild(swatch);
    const span = document.createElement('span');
    span.textContent = label;
    row.appendChild(span);
    el.appendChild(row);
  }
  const fog = document.createElement('div');
  fog.className = 'row';
  const fogSwatch = document.createElement('div');
  fogSwatch.className = 'fog-swatch';
  fog.appendChild(fogSwatch);
  const fogLabel = document.createElement('span');
  fogLabel.textContent = 'assombri \u2014 hors de sa vue';
  fog.appendChild(fogLabel);
  el.appendChild(fog);
})();

// ===========================================================================
// État du monde
// ===========================================================================

const world = {
  width: 0, height: 0,
  terrain: null,          // Int array [y][x] : 0 herbe, 1 zone chaude, 2 zone froide
  trees: [], rocks: [], baths: [], dangers: [],
  apples: [],
  artifacts: {},          // render hint -> [[x,y], ...] (seed, bush, branch, ...)
  visionRadius: null,     // rayon Manhattan de perception (null = vision totale)
  fouloides: new Map(),   // id -> {x, y, px, py, tx, ty, t0, carry}
  step: 0,
  tickMs: 150,
};

// ===========================================================================
// Caméra
// ===========================================================================

const canvas = document.getElementById('world-canvas');
const mapView = document.getElementById('map-view');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const cam = { x: 0, y: 0, zoom: 3 };  // x,y = centre en pixels-monde

// Dimensions en pixels CSS (logiques) ; le backing store est multiplié par le
// devicePixelRatio pour rester net sur écran HiDPI / téléphone.
const view = { w: 0, h: 0 };

function resize() {
  // On dimensionne le canvas sur son conteneur (#map-view), pas sur la fenêtre :
  // cela permet à la carte d'occuper toute la largeur disponible sur mobile.
  const rect = mapView.getBoundingClientRect();
  const cssW = Math.max(1, Math.round(rect.width || window.innerWidth));
  const cssH = Math.max(1, Math.round(rect.height || window.innerHeight));
  const dpr = Math.min(window.devicePixelRatio || 1, 2);  // cap à 2 (perfs mobile)
  view.w = cssW; view.h = cssH;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  // Le reste du rendu raisonne en pixels CSS ; on applique le dpr ici.
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
  clampCam();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add('dragging');
});
window.addEventListener('mouseup', () => { dragging = false; canvas.classList.remove('dragging'); });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  cam.x -= (e.clientX - lastX) / cam.zoom;
  cam.y -= (e.clientY - lastY) / cam.zoom;
  lastX = e.clientX; lastY = e.clientY;
  clampCam();
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const dir = e.deltaY < 0 ? 1 : -1;
  cam.zoom = Math.max(1, Math.min(6, cam.zoom + dir * 0.5));
  clampCam();
}, { passive: false });

// --- Tactile : un doigt = pan, deux doigts = pinch-zoom ---------------------
let touchPanX = 0, touchPanY = 0, pinchDist = 0;
function touchMid(t1, t2) { return [(t1.clientX + t2.clientX) / 2, (t1.clientY + t2.clientY) / 2]; }
function touchDist(t1, t2) {
  return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
}
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    pinchDist = touchDist(e.touches[0], e.touches[1]);
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    cam.x -= (e.touches[0].clientX - touchPanX) / cam.zoom;
    cam.y -= (e.touches[0].clientY - touchPanY) / cam.zoom;
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
    clampCam();
  } else if (e.touches.length === 2) {
    const d = touchDist(e.touches[0], e.touches[1]);
    if (pinchDist > 0) {
      cam.zoom = Math.max(1, Math.min(6, cam.zoom * (d / pinchDist)));
    }
    pinchDist = d;
    clampCam();
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.touches.length === 1) {
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
  }
  pinchDist = 0;
}, { passive: false });

const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

function clampCam() {
  if (!world.width) return;
  const wpx = world.width * TILE, hpx = world.height * TILE;
  cam.x = Math.max(0, Math.min(wpx, cam.x));
  cam.y = Math.max(0, Math.min(hpx, cam.y));
}

// ===========================================================================
// Rendu
// ===========================================================================

function drawSprite(spr, wx, wy, ox, oy) {
  // wx, wy en pixels-monde ; ox, oy = offset d'ancrage
  const sx = Math.round((wx - ox - cam.x) * cam.zoom + view.w / 2);
  const sy = Math.round((wy - oy - cam.y) * cam.zoom + view.h / 2);
  ctx.drawImage(spr, sx, sy, spr.width * cam.zoom, spr.height * cam.zoom);
}

function drawBar(wx, wy, frac, color) {
  // mini-barre de drive (style Sims) en pixels-monde
  const w = 14, h = 2;
  const sx = Math.round((wx - cam.x) * cam.zoom + view.w / 2);
  const sy = Math.round((wy - cam.y) * cam.zoom + view.h / 2);
  ctx.fillStyle = 'rgba(10, 16, 8, 0.75)';
  ctx.fillRect(sx, sy, w * cam.zoom, h * cam.zoom);
  ctx.fillStyle = color;
  ctx.fillRect(sx, sy, w * Math.max(0, Math.min(1, frac)) * cam.zoom, h * cam.zoom);
}

function temperatureComfort(t) {
  if (t === undefined || t === null) return null;
  return Math.max(0, Math.min(1, 1 - Math.abs(t - 0.5) * 2));
}

function render(now) {
  const pan = 12 / cam.zoom;
  if (keys.ArrowLeft) cam.x -= pan;
  if (keys.ArrowRight) cam.x += pan;
  if (keys.ArrowUp) cam.y -= pan;
  if (keys.ArrowDown) cam.y += pan;
  if (keys.ArrowLeft || keys.ArrowRight || keys.ArrowUp || keys.ArrowDown) clampCam();

  ctx.fillStyle = '#1a2a14';
  ctx.fillRect(0, 0, view.w, view.h);

  if (world.terrain) {
    const ts = TILE * cam.zoom;
    const x0 = Math.floor((cam.x - view.w / 2 / cam.zoom) / TILE) - 1;
    const y0 = Math.floor((cam.y - view.h / 2 / cam.zoom) / TILE) - 1;
    const x1 = x0 + Math.ceil(view.w / ts) + 2;
    const y1 = y0 + Math.ceil(view.h / ts) + 2;

    for (let ty = Math.max(0, y0); ty <= Math.min(world.height - 1, y1); ty++)
      for (let tx = Math.max(0, x0); tx <= Math.min(world.width - 1, x1); tx++) {
        const kind = TILES[world.terrain[ty][tx]] ? world.terrain[ty][tx] : 0;
        const v = Math.floor(hash(tx, ty, 3) * 3);
        const sx = Math.round((tx * TILE - cam.x) * cam.zoom + view.w / 2);
        const sy = Math.round((ty * TILE - cam.y) * cam.zoom + view.h / 2);
        ctx.drawImage(TILES[kind][v], sx, sy, ts, ts);
      }

    // Objets statiques + dynamiques, triés par y pour la profondeur
    const drawList = [];
    for (const [x, y] of world.dangers)
      drawList.push({ y: y * TILE + 9, f: () => drawSprite(SPR.danger, x * TILE, y * TILE, 0, 0) });
    for (const [x, y] of world.rocks)
      drawList.push({ y: y * TILE + 10, f: () => drawSprite(SPR.rock, x * TILE, y * TILE, 0, 0) });
    for (const [x, y] of world.baths)
      drawList.push({ y: y * TILE + 12, f: () => drawSprite(SPR.bath, x * TILE, y * TILE, 0, 0) });
    for (const [x, y] of world.apples)
      drawList.push({ y: y * TILE + 8, f: () => drawSprite(SPR.apple, x * TILE + 4, y * TILE + 4, 0, 0) });
    for (const [name, positions] of Object.entries(world.artifacts)) {
      const art = ARTIFACT_SPRITES[name];
      if (!art) continue;
      for (const [x, y] of positions)
        drawList.push({ y: y * TILE + 8, f: () =>
          drawSprite(SPR[art.spr], x * TILE + art.dx, y * TILE + art.dy, 0, 0) });
    }
    for (const f of world.fouloides.values()) {
      // interpolation entre la position précédente et la cible
      const t = Math.min(1, (now - f.t0) / world.tickMs);
      const px = (f.px + (f.tx - f.px) * t) * TILE;
      const py = (f.py + (f.ty - f.py) * t) * TILE;
      drawList.push({ y: py + TILE, f: () => {
        drawSprite(SPR.fouloide, px, py, 0, 0);
        if (f.carry) drawSprite(SPR.apple, px + 11, py + 8, 0, 0);
        if (f.drives) {
          drawBar(px + 1, py - 16, f.drives.wb ?? 0, '#b777e8'); // bien-être
          drawBar(px + 1, py - 13, f.drives.hp, '#e25b51');      // santé
          drawBar(px + 1, py - 10, f.drives.h2o, '#5aa7e0');     // hydratation
          drawBar(px + 1, py - 7, f.drives.en, '#e9b84d');       // énergie
          const temp = temperatureComfort(f.drives.temp);
          if (temp !== null) drawBar(px + 1, py - 4, temp, '#f08a3c'); // confort T°
        }
      }});
    }
    for (const [x, y] of world.trees)
      drawList.push({ y: y * TILE + 15, f: () => drawSprite(SPR.tree, x * TILE, y * TILE, 0, 0) });

    drawList.sort((a, b) => a.y - b.y);
    for (const d of drawList) d.f();

    // Brouillard de perception : ce qui est hors du losange de vision
    // (distance Manhattan) n'est pas observé par le fouloïde.
    if (world.visionRadius !== null && world.fouloides.size > 0) {
      const eyes = [];
      for (const f of world.fouloides.values()) {
        const t = Math.min(1, (now - f.t0) / world.tickMs);
        eyes.push([f.px + (f.tx - f.px) * t, f.py + (f.ty - f.py) * t]);
      }
      ctx.fillStyle = 'rgba(8, 14, 6, 0.45)';
      for (let ty = Math.max(0, y0); ty <= Math.min(world.height - 1, y1); ty++)
        for (let tx = Math.max(0, x0); tx <= Math.min(world.width - 1, x1); tx++) {
          let dmin = Infinity;
          for (const [ex, ey] of eyes) {
            const d = Math.abs(tx - ex) + Math.abs(ty - ey);
            if (d < dmin) dmin = d;
          }
          if (dmin > world.visionRadius + 0.01) {
            const sx = Math.round((tx * TILE - cam.x) * cam.zoom + view.w / 2);
            const sy = Math.round((ty * TILE - cam.y) * cam.zoom + view.h / 2);
            ctx.fillRect(sx, sy, ts, ts);
          }
        }
    }
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ===========================================================================
// WebSocket — protocole moteur de monde
//
// {"type":"world","width","height","terrain","trees","rocks","baths","tick_ms"}
// {"type":"step","step","fouloides":[{"id","x","y","carry"}],"apples":[[x,y]],
//  "stats":{"population":n},"objective":"..."}
// ===========================================================================

const statusEl = document.getElementById('status');
const popEl = document.getElementById('pop-count');
const objEl = document.getElementById('objective-text');

function onWorld(d) {
  world.width = d.width; world.height = d.height;
  world.terrain = d.terrain;
  world.trees = d.trees || [];
  world.rocks = d.rocks || [];
  world.baths = d.baths || [];
  world.dangers = d.dangers || [];
  world.artifacts = d.artifacts || {};
  world.visionRadius = (d.vision_radius === undefined) ? null : d.vision_radius;
  if (d.tick_ms) world.tickMs = d.tick_ms;
  cam.x = world.width * TILE / 2;
  cam.y = world.height * TILE / 2;
  clampCam();
}

function onStep(d, now) {
  world.step = d.step;
  if (d.terrain) world.terrain = d.terrain;
  world.apples = d.apples || [];
  if (d.baths) world.baths = d.baths;
  if (d.rocks) world.rocks = d.rocks;
  if (d.dangers) world.dangers = d.dangers;
  if (d.artifacts) world.artifacts = d.artifacts;
  const seen = new Set();
  for (const f of d.fouloides || []) {
    seen.add(f.id);
    const prev = world.fouloides.get(f.id);
    const drives = (f.hp === undefined) ? null : {
      hp: f.hp,
      h2o: f.h2o,
      en: f.en,
      temp: f.temp,
      wb: f.wellbeing,
    };
    if (prev) {
      // l'ancienne cible devient le point de départ de l'interpolation
      world.fouloides.set(f.id, {
        px: prev.tx, py: prev.ty, tx: f.x, ty: f.y, t0: now, carry: !!f.carry, drives,
      });
    } else {
      world.fouloides.set(f.id, {
        px: f.x, py: f.y, tx: f.x, ty: f.y, t0: now, carry: !!f.carry, drives,
      });
    }
  }
  for (const id of world.fouloides.keys()) if (!seen.has(id)) world.fouloides.delete(id);
  if (d.stats && d.stats.population !== undefined) popEl.textContent = d.stats.population;
  if (d.objective) objEl.textContent = d.objective;
  if (d.stats && d.stats.event) showEvent(d.stats.event);
  if (d.stats) dashboard.push(d.stats, d.step);
}

// --- Ticker des découvertes -------------------------------------------------
const EVENT_LABELS = {
  pick_ok: '\u{1F91A} a ramass\u00e9 quelque chose',
  drop_ok: 'a pos\u00e9 un objet',
  plant_ok: '\u{1F331} a plant\u00e9 !',
  combine_ok: '\u{1F525} a fabriqu\u00e9 quelque chose !',
  interact_hydration: '\u{1F4A7} a bu',
  interact_water: '\u{1F4A7} a bu',
  interact_energy: '\u{1F34E} a mang\u00e9',
  interact_food: '\u{1F34E} a mang\u00e9',
  death: '\u{1F480} est mort\u2026',
};
const tickerEl = document.getElementById('event-ticker');
let tickerTimeout = null;

function showEvent(event) {
  const label = EVENT_LABELS[event];
  if (!label) return;
  tickerEl.textContent = label;

}

// ===========================================================================
// Tableau de bord d'apprentissage
//
// Collecte les stats du flux WS côté client (tableaux roulants, max 2000 pts)
// et trace des séries temporelles légères en canvas pur (aucune lib externe :
// la CSP du déploiement bloque tout CDN).
// ===========================================================================

const dashboard = (() => {
  const CAP = 2000;
  const steps = [];
  // Séries collectées tick par tick (valeurs ou null si absentes ce tick).
  const series = {
    wellbeing: [], wellbeing_avg: [],
    wm_loss: [], wm_recon: [], wm_kl: [], wm_reward: [], wm_continue: [],
    td_loss: [], imag_return: [], imag_entropy: [],
    deaths: [],   // nb cumulé de morts (dérivé de "life")
  };
  let lastLife = null;
  let totalDeaths = 0;
  let lastStep = 0;
  let dirty = false;
  let visible = false;

  const num = (v) => (typeof v === 'number' && isFinite(v)) ? v : null;

  function push(stats, step) {
    lastStep = (step !== undefined && step !== null) ? step : lastStep + 1;
    // "life" est le numéro de vie courant ; chaque incrément = une mort.
    const life = num(stats.life);
    if (life !== null) {
      if (lastLife !== null && life > lastLife) totalDeaths += (life - lastLife);
      lastLife = life;
    } else if (num(stats.deaths) !== null) {
      totalDeaths = stats.deaths;
    }
    steps.push(lastStep);
    series.wellbeing.push(num(stats.wellbeing));
    series.wellbeing_avg.push(num(stats.wellbeing_avg));
    series.wm_loss.push(num(stats.wm_loss));
    series.wm_recon.push(num(stats.wm_recon));
    series.wm_kl.push(num(stats.wm_kl));
    series.wm_reward.push(num(stats.wm_reward));
    series.wm_continue.push(num(stats.wm_continue));
    series.td_loss.push(num(stats.td_loss));
    series.imag_return.push(num(stats.imag_return));
    series.imag_entropy.push(num(stats.imag_entropy));
    series.deaths.push(totalDeaths);
    if (steps.length > CAP) {
      steps.shift();
      for (const k in series) series[k].shift();
    }
    latest = stats;
    dirty = true;
  }

  let latest = null;

  // -- Cartes de métriques instantanées --------------------------------------
  const METRICS = [
    ['wellbeing', 'bien-être', v => v.toFixed(2)],
    ['health', 'santé', v => v.toFixed(2)],
    ['life', 'vie n°', v => String(Math.round(v))],
    ['life_steps', 'steps cette vie', v => String(Math.round(v))],
    ['best_life_steps', 'record steps', v => String(Math.round(v))],
    ['wm_loss', 'wm_loss', v => v.toFixed(3)],
    ['epsilon', 'exploration ε', v => v.toFixed(2)],
    ['step', 'steps totaux', v => String(Math.round(v))],
  ];
  const gridEl = document.getElementById('metric-grid');
  const metricEls = {};
  for (const [key, label] of METRICS) {
    const card = document.createElement('div');
    card.className = 'metric';
    const k = document.createElement('div'); k.className = 'k'; k.textContent = label;
    const v = document.createElement('div'); v.className = 'v'; v.textContent = '—';
    card.appendChild(k); card.appendChild(v);
    gridEl.appendChild(card);
    metricEls[key] = v;
  }
  // Carte dérivée : morts cumulées + cadence.
  const deathCard = document.createElement('div');
  deathCard.className = 'metric';
  deathCard.innerHTML = '<div class="k">morts cumulées</div><div class="v" id="m-deaths">—</div>';
  gridEl.appendChild(deathCard);
  const deathsEl = deathCard.querySelector('.v');

  // -- Graphiques (canvas) ----------------------------------------------------
  // Chaque graphe = une carte avec un canvas + une ou plusieurs séries.
  const CHART_DEFS = [
    {
      title: 'Bien-être',
      lines: [
        { key: 'wellbeing', color: '#b777e8', label: 'brut' },
        { key: 'wellbeing_avg', color: '#f2e6b8', label: 'moyenne' },
      ],
    },
    {
      title: 'Morts cumulées',
      lines: [{ key: 'deaths', color: '#e0705a', label: 'morts' }],
    },
    {
      title: 'Modèle du monde (RSSM)',
      lines: [
        { key: 'wm_loss', color: '#9fd28a', label: 'wm_loss' },
        { key: 'wm_recon', color: '#5aa7e0', label: 'recon' },
        { key: 'wm_kl', color: '#e9b84d', label: 'kl' },
        { key: 'wm_reward', color: '#e25b51', label: 'reward' },
        { key: 'wm_continue', color: '#82c4ef', label: 'continue' },
      ],
    },
    {
      title: 'Imagination (acteur-critique)',
      lines: [
        { key: 'imag_return', color: '#6fbf6a', label: 'return' },
        { key: 'imag_entropy', color: '#f08a3c', label: 'entropie' },
      ],
    },
  ];
  const chartsEl = document.getElementById('charts');
  const charts = [];
  for (const def of CHART_DEFS) {
    const card = document.createElement('div');
    card.className = 'chart-card';
    const title = document.createElement('div');
    title.className = 'title';
    const tspan = document.createElement('span');
    tspan.textContent = def.title;
    title.appendChild(tspan);
    for (const line of def.lines) {
      const dot = document.createElement('span');
      dot.className = 'legend-dot';
      const i = document.createElement('i'); i.style.background = line.color;
      dot.appendChild(i);
      dot.appendChild(document.createTextNode(line.label));
      title.appendChild(dot);
    }
    const cv = document.createElement('canvas');
    card.appendChild(title);
    card.appendChild(cv);
    chartsEl.appendChild(card);
    charts.push({ def, canvas: cv, ctx: cv.getContext('2d') });
  }

  function drawChart(chart) {
    const { canvas: cv, ctx: c, def } = chart;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssW = cv.clientWidth || 280;
    const cssH = cv.clientHeight || 130;
    if (cv.width !== Math.round(cssW * dpr) || cv.height !== Math.round(cssH * dpr)) {
      cv.width = Math.round(cssW * dpr);
      cv.height = Math.round(cssH * dpr);
    }
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    c.clearRect(0, 0, cssW, cssH);
    c.fillStyle = 'rgba(10,20,8,0.35)';
    c.fillRect(0, 0, cssW, cssH);

    const pad = 4;
    const n = steps.length;
    if (n < 2) return;

    // Échelle Y commune à toutes les lignes de la carte.
    let lo = Infinity, hi = -Infinity;
    for (const line of def.lines) {
      const arr = series[line.key];
      for (let i = 0; i < arr.length; i++) {
        const v = arr[i];
        if (v === null) continue;
        if (v < lo) lo = v;
        if (v > hi) hi = v;
      }
    }
    if (!isFinite(lo) || !isFinite(hi)) return;
    if (hi - lo < 1e-9) { hi += 1; lo -= 1; }
    const range = hi - lo;

    const x = (i) => pad + (cssW - 2 * pad) * (i / (n - 1));
    const y = (v) => cssH - pad - (cssH - 2 * pad) * ((v - lo) / range);

    // Grille horizontale (3 lignes).
    c.strokeStyle = 'rgba(159,210,138,0.12)';
    c.lineWidth = 1;
    for (let g = 0; g <= 2; g++) {
      const gy = pad + (cssH - 2 * pad) * (g / 2);
      c.beginPath(); c.moveTo(pad, gy); c.lineTo(cssW - pad, gy); c.stroke();
    }

    for (const line of def.lines) {
      const arr = series[line.key];
      c.strokeStyle = line.color;
      c.lineWidth = 1.5;
      c.beginPath();
      let started = false;
      for (let i = 0; i < arr.length; i++) {
        const v = arr[i];
        if (v === null) { started = false; continue; }
        const px = x(i), py = y(v);
        if (!started) { c.moveTo(px, py); started = true; }
        else c.lineTo(px, py);
      }
      c.stroke();
    }

    // Étiquettes min/max.
    c.fillStyle = 'rgba(207,232,192,0.7)';
    c.font = '9px "Courier New", monospace';
    c.textBaseline = 'top';
    c.fillText(hi.toFixed(2), pad + 2, pad + 1);
    c.textBaseline = 'bottom';
    c.fillText(lo.toFixed(2), pad + 2, cssH - pad - 1);
  }

  function renderMetrics() {
    if (!latest) return;
    for (const [key, , fmt] of METRICS) {
      const v = num(latest[key]);
      metricEls[key].textContent = (v === null) ? '—' : fmt(v);
    }
    let rate = '';
    if (totalDeaths > 0 && lastStep > 0) {
      rate = ` <small>~1 / ${Math.round(lastStep / totalDeaths)} steps</small>`;
    }
    deathsEl.innerHTML = String(totalDeaths) + rate;
  }

  // Boucle de rendu : seulement quand l'onglet Stats est visible et qu'il y a
  // de nouvelles données (économie CPU/batterie sur mobile).
  function tick() {
    if (visible && dirty) {
      document.getElementById('dash-waiting').style.display = steps.length ? 'none' : '';
      renderMetrics();
      for (const ch of charts) drawChart(ch);
      dirty = false;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  function setVisible(v) { visible = v; if (v) dirty = true; }

  return { push, setVisible };
})();

// --- Bascule d'onglets Carte / Stats ----------------------------------------
(function setupTabs() {
  const body = document.body;
  const mapBtn = document.getElementById('tab-map-btn');
  const statsBtn = document.getElementById('tab-stats-btn');
  function show(tab) {
    const isMap = tab === 'map';
    body.classList.toggle('tab-map', isMap);
    body.classList.toggle('tab-stats', !isMap);
    mapBtn.classList.toggle('active', isMap);
    statsBtn.classList.toggle('active', !isMap);
    dashboard.setVisible(!isMap);
    if (isMap) resize();   // recalcule le canvas (il était masqué : taille 0)
  }
  mapBtn.addEventListener('click', () => show('map'));
  statsBtn.addEventListener('click', () => show('stats'));
})();

const BUILT_WS_URL = "";

function configuredWsUrl() {
  const queryWs = new URLSearchParams(location.search).get('ws');
  if (queryWs) return queryWs;
  if (window.SEEDMIND_WS_URL) return window.SEEDMIND_WS_URL;
  if (BUILT_WS_URL && !BUILT_WS_URL.startsWith('__')) return BUILT_WS_URL;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const basePort = Number.parseInt(location.port || (location.protocol === 'https:' ? '443' : '80'), 10);
  return `${proto}://${location.hostname}:${basePort + 1}`;
}

function connect() {
  const ws = new WebSocket(configuredWsUrl());
  ws.onopen = () => { statusEl.textContent = 'monde connect\u00e9'; statusEl.classList.remove('offline'); };
  ws.onclose = () => {
    statusEl.textContent = 'd\u00e9connect\u00e9 \u2014 reconnexion\u2026';
    statusEl.classList.add('offline');
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = evt => {
    const d = JSON.parse(evt.data);
    if (d.type === 'world') onWorld(d);
    else if (d.type === 'step') onStep(d, performance.now());
  };
}
connect();
</script>
